<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATEY - Emergency Profile</title>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #333;
        }
        .profile-header h1 {
            color: #fbbf24;
            margin-bottom: 10px;
        }
        .profile-input-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #0a0a0a;
            border-radius: 8px;
        }
        .profile-input {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .profile-input label {
            color: #888;
            font-size: 14px;
            font-weight: 600;
        }
        .profile-input input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
        }
        .profile-input input:focus {
            outline: none;
            border-color: #fbbf24;
        }
        .load-profile-btn {
            background: #fbbf24;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .load-profile-btn:hover {
            background: #f59e0b;
            transform: translateY(-1px);
        }
        .profile-display {
            background: #0a0a0a;
            padding: 30px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .profile-field {
            margin-bottom: 20px;
        }
        .profile-field label {
            display: block;
            color: #888;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .profile-field-value {
            color: #fff;
            font-size: 16px;
            line-height: 1.6;
        }
        .profile-section {
            margin-bottom: 25px;
        }
        .profile-section h3 {
            color: #10b981;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .contact-item {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 3px solid #10b981;
        }
        .error-message {
            background: #ef4444;
            color: #fff;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #dc2626;
        }
        .loading {
            text-align: center;
            color: #888;
            padding: 40px;
            font-size: 16px;
        }
        .nav-back {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #fbbf24;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }
        .nav-back:hover {
            background: #2a2a2a;
            border-color: #fbbf24;
        }
    </style>
</head>

<body>
    <a href="index.html" class="nav-back">← BACK TO DASHBOARD</a>
    
    <div class="profile-container">
        <div class="profile-header">
            <h1>Emergency Profile Viewer</h1>
            <p>View emergency medical information by user ID</p>
        </div>

        <div class="profile-input-section">
            <div class="profile-input">
                <label>USER ID:</label>
                <input type="text" id="userIdInput" placeholder="Enter user ID (e.g., 3b32f6c8-5767-49c2-9fcd-48465aa7d8af)">
                <button class="load-profile-btn" onclick="loadEmergencyProfile()">VIEW PROFILE</button>
            </div>
        </div>

        <div id="profileContent">
            <div class="loading">Enter a user ID to view their emergency profile</div>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    
    <script>
        async function loadEmergencyProfile() {
            const userId = document.getElementById('userIdInput').value.trim();
            const profileContent = document.getElementById('profileContent');

            if (!userId) {
                profileContent.innerHTML = '<div class="error-message">Please enter a user ID</div>';
                return;
            }

            profileContent.innerHTML = '<div class="loading">Loading emergency profile...</div>';

            try {
                const { data, error } = await supabaseClient
                    .from('emergency_profiles')
                    .select('*')
                    .eq('user_id', userId)
                    .single();

                if (error) {
                    if (error.code === 'PGRST116') {
                        profileContent.innerHTML = '<div class="error-message">Profile not found for this user ID</div>';
                    } else {
                        profileContent.innerHTML = `<div class="error-message">Error loading profile: ${error.message}</div>`;
                    }
                    return;
                }

                if (data) {
                    profileContent.innerHTML = `
                        <div class="profile-display">
                            <div class="profile-section">
                                <h3>Personal Information</h3>
                                <div class="profile-field">
                                    <label>Full Name</label>
                                    <div class="profile-field-value">${data.full_name || 'Not provided'}</div>
                                </div>
                                <div class="profile-field">
                                    <label>Email</label>
                                    <div class="profile-field-value">${data.email || 'Not provided'}</div>
                                </div>
                                <div class="profile-field">
                                    <label>Blood Group</label>
                                    <div class="profile-field-value">${data.blood_group || 'Not provided'}</div>
                                </div>
                            </div>

                            <div class="profile-section">
                                <h3>Emergency Contacts</h3>
                                <div class="contact-item">
                                    <strong>Contact 1:</strong> ${data.contact_1 || 'Not provided'}
                                </div>
                                <div class="contact-item">
                                    <strong>Contact 2:</strong> ${data.contact_2 || 'Not provided'}
                                </div>
                                <div class="contact-item">
                                    <strong>Contact 3:</strong> ${data.contact_3 || 'Not provided'}
                                </div>
                            </div>

                            <div class="profile-section">
                                <h3>Medical Information</h3>
                                <div class="profile-field">
                                    <label>Medical Notes</label>
                                    <div class="profile-field-value">${data.medical_notes || 'No medical notes provided'}</div>
                                </div>
                                <div class="profile-field">
                                    <label>Allergies</label>
                                    <div class="profile-field-value">${data.allergies || 'No allergies recorded'}</div>
                                </div>
                                <div class="profile-field">
                                    <label>Medications</label>
                                    <div class="profile-field-value">${data.medications || 'No medications recorded'}</div>
                                </div>
                            </div>

                            <div class="profile-section">
                                <h3>Profile Information</h3>
                                <div class="profile-field">
                                    <label>User ID</label>
                                    <div class="profile-field-value" style="font-family: monospace; font-size: 12px;">${data.user_id}</div>
                                </div>
                                <div class="profile-field">
                                    <label>Created</label>
                                    <div class="profile-field-value">${new Date(data.created_at).toLocaleString()}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                profileContent.innerHTML = `<div class="error-message">Failed to load profile: ${error.message}</div>`;
            }
        }

        // Allow Enter key to submit
        document.getElementById('userIdInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loadEmergencyProfile();
            }
        });

        // Auto-load profile if user_id is in URL
        window.addEventListener('load', function() {
            const params = new URLSearchParams(window.location.search);
            const userId = params.get('user_id');
            if (userId) {
                document.getElementById('userIdInput').value = userId;
                loadEmergencyProfile();
            }
        });
    </script>
</body>

</html>
