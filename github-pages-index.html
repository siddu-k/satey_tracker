<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #121212; 
            color: #fff; 
            margin: 0;
            padding: 20px;
        }
        .container { 
            max-width: 600px; 
            margin: auto; 
            padding: 20px; 
            background: #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h1 { 
            color: #fbbf24; 
            text-align: center; 
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
        }
        h2 { 
            color: #fff; 
            margin-bottom: 15px;
        }
        h3 { 
            color: #10b981; 
            margin-top: 25px;
            margin-bottom: 10px;
        }
        p { 
            line-height: 1.6; 
            margin-bottom: 10px;
        }
        .error { 
            color: #ef4444; 
            background: #fef2f2;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #ef4444;
        }
        .loading { 
            text-align: center; 
            color: #888;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Emergency Profile</h1>
        <div id="profile-data" class="loading">Loading profile...</div>
    </div>

    <script>
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadProfile() {
            const params = new URLSearchParams(window.location.search);
            const userId = params.get('user_id');
            const profileDiv = document.getElementById('profile-data');

            if (!userId) {
                profileDiv.innerHTML = '<div class="error">No user ID provided.</div>';
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('emergency_profiles')
                    .select('*')
                    .eq('user_id', userId)
                    .single();

                if (error) throw error;

                if (data) {
                    profileDiv.innerHTML = `
                        <h2>${data.full_name || 'No Name Provided'}</h2>
                        <p><strong>Blood Group:</strong> ${data.blood_group || 'N/A'}</p>
                        
                        <h3>Emergency Contacts:</h3>
                        <p>${data.contact_1 || 'No Contact 1'}</p>
                        <p>${data.contact_2 || 'No Contact 2'}</p>
                        <p>${data.contact_3 || 'No Contact 3'}</p>
                        
                        <h3>Medical Notes:</h3>
                        <p>${data.medical_notes || 'None'}</p>
                    `;
                } else {
                    profileDiv.innerHTML = '<div class="error">Profile not found.</div>';
                }
            } catch (error) {
                profileDiv.innerHTML = `<div class="error">Error loading profile: ${error.message}</div>`;
            }
        }

        loadProfile();
    </script>
</body>
</html>
